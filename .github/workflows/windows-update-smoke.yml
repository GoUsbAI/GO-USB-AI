name: windows-update-smoke

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "packages/go-usb-ai/**"
      - ".github/workflows/windows-update-smoke.yml"
  pull_request:
    paths:
      - "packages/go-usb-ai/**"
      - ".github/workflows/windows-update-smoke.yml"

permissions:
  contents: read

concurrency:
  group: windows-update-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-update-smoke:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install released go-usb-ai CLI
        shell: pwsh
        run: npm install -g go-usb-ai

      - name: Run go-usb-ai update on Windows
        shell: pwsh
        env:
          GOUSB_AI_UPDATE_COMMAND: 'node -e "process.exit(0)"'
        run: |
          $ErrorActionPreference = "Stop"
          $output = go-usb-ai update 2>&1
          $output | Out-Host
          if ($LASTEXITCODE -ne 0) {
            throw "go-usb-ai update failed with exit code $LASTEXITCODE"
          }
