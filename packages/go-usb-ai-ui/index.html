<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/pwa-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="GO-USB-AI" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F9F8F5" />
  <meta name="color-scheme" content="light" />
  <style>
    html,
    body,
    #root {
      background: #f9f8f5;
    }

    html[data-theme="cool"],
    html[data-theme="cool"] body,
    html[data-theme="cool"] #root {
      background: #f8fafb;
    }
  </style>
  <script>
    (() => {
      const storageKey = 'go-usb-ai.ui.theme';
      const storedTheme = window.localStorage.getItem(storageKey);
      const nextTheme = storedTheme === 'cool' ? 'cool' : 'warm';
      const themeColor = nextTheme === 'cool' ? '#F8FAFB' : '#F9F8F5';
      document.documentElement.setAttribute('data-theme', nextTheme);
      document.documentElement.style.backgroundColor = themeColor;
      document.documentElement.style.colorScheme = 'light';
      const themeMeta = document.querySelector('meta[name="theme-color"]');
      if (themeMeta) {
        themeMeta.setAttribute('content', themeColor);
      }
    })();
  </script>
  <script>
    (() => {
      const devResetKey = 'go-usb-ai-pwa-dev-sw-reset';
      const isViteDevServer = '%MODE%' === 'development';
      if (!isViteDevServer || !('serviceWorker' in navigator)) {
        return;
      }

      void navigator.serviceWorker.getRegistrations().then(async (registrations) => {
        const goUsbAiRegistrations = registrations.filter((registration) => {
          const scriptUrls = [registration.active?.scriptURL, registration.installing?.scriptURL, registration.waiting?.scriptURL]
            .filter(Boolean);
          return scriptUrls.some((scriptUrl) => scriptUrl.endsWith('/sw.js'));
        });

        if (goUsbAiRegistrations.length === 0) {
          window.sessionStorage.removeItem(devResetKey);
          return;
        }

        await Promise.all(goUsbAiRegistrations.map(async (registration) => await registration.unregister()));
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter((key) => key.startsWith('go-usb-ai-ui-')).map(async (key) => await caches.delete(key)));
        }

        if (navigator.serviceWorker.controller && window.sessionStorage.getItem(devResetKey) !== '1') {
          window.sessionStorage.setItem(devResetKey, '1');
          window.location.reload();
          return;
        }

        window.sessionStorage.removeItem(devResetKey);
      });
    })();
  </script>
  <title>GO-USB-AI</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
