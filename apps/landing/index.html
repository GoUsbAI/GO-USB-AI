<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#677656" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="author" content="GoUsbAi Project" />
  <title>GoUsbAi</title>
  <meta name="description" content="GoUsbAi landing page language redirect." />
  <link rel="canonical" href="https://go-usb-ai.io/" />
  <link rel="alternate" hreflang="en" href="https://go-usb-ai.io/en/" />
  <link rel="alternate" hreflang="zh-CN" href="https://go-usb-ai.io/zh/" />
  <link rel="alternate" hreflang="x-default" href="https://go-usb-ai.io/" />
  <script>
    (function () {
      var key = 'go-usb-ai.landing.locale';
      var locale = null;
      try {
        var saved = localStorage.getItem(key);
        if (saved === 'en' || saved === 'zh') {
          locale = saved;
        }
      } catch (_) {}
      if (!locale) {
        var lang = (navigator.languages && navigator.languages[0]) || navigator.language || 'en';
        locale = /^zh\b/i.test(lang) ? 'zh' : 'en';
      }
      location.replace('/' + locale + '/' + location.search + location.hash);
    })();
  </script>
</head>
<body>
  <noscript>
    <p>
      Choose language:
      <a href="/en/">English</a> |
      <a href="/zh/">简体中文</a>
    </p>
  </noscript>
</body>
</html>
