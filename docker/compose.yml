services:
  go-usb-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ${GOUSB_AI_DOCKER_CONTAINER_NAME:-go-usb-ai}
    environment:
      GOUSB_AI_HOME: /data
      GOUSB_AI_UI_PORT: ${GOUSB_AI_DOCKER_UI_PORT:-55667}
    ports:
      - "${GOUSB_AI_DOCKER_UI_PORT:-55667}:${GOUSB_AI_DOCKER_UI_PORT:-55667}"
      - "${GOUSB_AI_DOCKER_API_PORT:-18790}:18790"
    volumes:
      - "${GOUSB_AI_DOCKER_DATA_DIR:-./.go-usb-ai-docker}:/data"
    restart: unless-stopped
